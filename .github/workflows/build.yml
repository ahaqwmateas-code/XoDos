name: Flutter Build APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'master'

      - name: Repair, Configure JitPack, and Build
        run: |
          # 1. Recreate platform files
          flutter create --platforms=android .
          
          # 2. Fix the missing assets folder error
          mkdir -p assets
          
          # 3. Bulletproof JitPack Injection using Python
          python -c '
          f = "android/settings.gradle.kts"
          with open(f, "r") as file:
              c = file.read()
          # This safely injects JitPack right below Maven
          c = c.replace("mavenCentral()", "mavenCentral()\n        maven { url = uri(\"https://jitpack.io\") }")
          with open(f, "w") as file:
              file.write(c)
          '
          
          # 4. Build the APK
          flutter pub get
          flutter build apk --release --tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: XoDos-Final-Build
          path: build/app/outputs/flutter-apk/app-release.apk
