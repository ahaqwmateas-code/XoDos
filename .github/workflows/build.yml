name: Build XoDos Fully Functional
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter (Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Global SDK Fix
        run: |
          # 1. Generate files
          flutter create --platforms=android .
          
          # 2. Force minSdkVersion 26 in the build script
          sed -i 's/minSdkVersion .*/minSdkVersion 26/' android/app/build.gradle
          
          # 3. Force minSdkVersion 26 in the Manifest file directly
          sed -i 's/android:minSdkVersion="[^"]*"/android:minSdkVersion="26"/' android/app/src/main/AndroidManifest.xml
          
          # 4. Fix missing assets folder
          mkdir -p assets
          touch assets/.gitkeep

      - name: Build Final APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: XoDos-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
