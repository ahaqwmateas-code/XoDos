name: Flutter Build APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'master'

      - name: Build APK
        run: |
          # This forces the project to update its old Android files
          flutter pub get
          flutter build apk --release --no-pub --tree-shake-icons
        continue-on-error: false

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: XoDos-Master-Build
          path: build/app/outputs/flutter-apk/app-release.apk
