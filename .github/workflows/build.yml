name: Flutter Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Build Preparation
        run: |
          mkdir -p assets
          touch assets/.gitkeep
          flutter create --platforms android --org bin.mt .
          
          cat <<KTS > android/build.gradle.kts
          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  maven { url = uri("https://jitpack.io") }
              }
          }
          KTS

          cat <<KTS > android/app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("kotlin-android")
              id("dev.flutter.flutter-gradle-plugin")
          }
          android {
              namespace = "bin.mt.xodos"
              compileSdk = 36
              ndkVersion = "28.2.13676358"
              defaultConfig {
                  applicationId = "bin.mt.xodos"
                  minSdk = 26
                  targetSdk = 36
                  versionCode = 1
                  versionName = "1.0.0"
              }
              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
              kotlinOptions { jvmTarget = "17" }
              buildTypes {
                  release {
                      isMinifyEnabled = false
                      isShrinkResources = false
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }
          }
          dependencies {
              implementation("com.github.xodiosx:termux-x11:1.0.5.r7")
              implementation("com.github.xodiosx:avnc:1.0.2")
          }
          KTS

          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/<manifest/<manifest xmlns:tools="http:\/\/schemas.android.com\/tools"/' $MANIFEST
          sed -i 's/<uses-sdk[^>]*\/>/<uses-sdk android:minSdkVersion="26" android:targetSdkVersion="36" tools:overrideLibrary="com.termux.x11, com.gaurav.avnc, com.example.avnc_flutter, com.example.x11_flutter" \/>/' $MANIFEST

      - name: Compile APK
        run: |
          flutter pub get
          # We use assembleRelease directly to bypass the 'file not found' helper error
          cd android && ./gradlew assembleRelease

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: XoDos-Final-Build
          # This wildcard path will find the APK no matter where Gradle put it
          path: "android/app/build/outputs/apk/release/*.apk"
