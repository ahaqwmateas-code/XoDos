name: Flutter Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Configure Android Project
        run: |
          flutter create --platforms android --org bin.mt .
          
          # Create corrected build.gradle.kts
          cat <<KTS > android/app/build.gradle.kts
          plugins {
              id("com.android.application")
              id("kotlin-android")
              id("dev.flutter.flutter-gradle-plugin")
          }
          android {
              namespace = "bin.mt.xodos"
              compileSdk = 34
              defaultConfig {
                  applicationId = "bin.mt.xodos"
                  minSdk = 26
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0.0"
              }
              buildTypes {
                  release {
                      isMinifyEnabled = false
                      isShrinkResources = false
                      signingConfig = signingConfigs.getByName("debug")
                  }
              }
          }
          repositories {
              google()
              mavenCentral()
              maven { url = uri("https://jitpack.io") }
          }
          dependencies {
              implementation("com.github.xodiosx:termux-x11:1.0.5.r7")
          }
          KTS

          # Fix Manifest for Overrides
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/<manifest/<manifest xmlns:tools="http:\/\/schemas.android.com\/tools"/' $MANIFEST
          sed -i 's/<uses-sdk[^>]*\/>/<uses-sdk android:minSdkVersion="26" android:targetSdkVersion="34" tools:overrideLibrary="com.termux.x11, com.gaurav.avnc" \/>/' $MANIFEST

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons --no-shrink
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: xodos-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
