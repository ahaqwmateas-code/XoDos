name: Build XoDos
on:
  push:
    branches: [ master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Global Version 26
        run: |
          flutter create --platforms=android .
          # Force every single gradle file to use minSdk 26
          find android -name "build.gradle" -exec sed -i 's/minSdkVersion [0-9]*/minSdkVersion 26/g' {} +
          find android -name "build.gradle" -exec sed -i 's/minSdk [0-9]*/minSdk 26/g' {} +
          
          # Force the Android Manifest to use 26
          find android -name "AndroidManifest.xml" -exec sed -i 's/android:minSdkVersion="[0-9]*"/android:minSdkVersion="26"/g' {} +
          
          # Create local.properties as a backup
          echo "flutter.minSdkVersion=26" > android/local.properties
          
          mkdir -p assets && touch assets/.gitkeep

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - uses: actions/upload-artifact@v4
        with:
          name: XoDos-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
