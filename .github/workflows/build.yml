name: Build XoDos
on:
  push:
    branches: [ master ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Configure Android Versioning
        run: |
          flutter create --platforms=android .
          # Overwrite the build.gradle with a clean version that uses variables
          cat << 'INNER_EOF' > android/app/build.gradle
          def localProperties = new Properties()
          def localPropertiesFile = rootProject.file('local.properties')
          if (localPropertiesFile.exists()) {
              localPropertiesFile.withReader('UTF-8') { reader ->
                  localProperties.load(reader)
              }
          }

          def flutterRoot = localProperties.getProperty('flutter.sdk')
          if (flutterRoot == null) {
              throw new GradleException("Flutter SDK not found. Define location with flutter.sdk in the local.properties file.")
          }

          apply plugin: 'com.android.application'
          apply plugin: 'kotlin-android'
          apply from: "$flutterRoot/packages/flutter_tools/gradle/flutter.gradle"

          android {
              namespace "com.termux.x11"
              compileSdkVersion 34
              ndkVersion "27.0.12077973"

              defaultConfig {
                  applicationId "com.termux.x11"
                  minSdkVersion 26
                  targetSdkVersion 33
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.debug
                  }
              }
          }

          dependencies {
              implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
          }
          INNER_EOF
          
          # Ensure local.properties exists for the build
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          mkdir -p assets && touch assets/.gitkeep

      - name: Build APK
        run: |
          flutter pub get
          flutter build apk --release --no-tree-shake-icons
          
      - uses: actions/upload-artifact@v4
        with:
          name: XoDos-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
