name: Flutter Build APK

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'master'

      - name: Repair, Configure JitPack, and Build
        run: |
          # 1. Recreate platform files
          flutter create --platforms=android .
          
          # 2. Inject JitPack into the newly created settings.gradle.kts
          # This is the "Magic Fix" for the missing com.github files
          sed -i '/mavenCentral()/a \        maven { url = uri("https://jitpack.io") }' android/settings.gradle.kts
          
          # 3. Build the APK
          flutter pub get
          flutter build apk --release --tree-shake-icons

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: XoDos-Final-Build
          path: build/app/outputs/flutter-apk/app-release.apk
