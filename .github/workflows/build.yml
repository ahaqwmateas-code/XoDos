name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m"
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Prepare assets and memory
        run: |
          mkdir -p assets
          mkdir -p android
          echo "org.gradle.jvmargs=-Xmx4096m" >> android/gradle.properties

      - name: Generate Android platform files
        run: flutter create --platforms=android .

      - name: Add JitPack repository
        run: |
          python3 -c '
          f = "android/settings.gradle.kts"
          with open(f, "r") as file:
              c = file.read()
          new_line = "mavenCentral()\n        maven { url = uri(\"https://jitpack.io\") }"
          c = c.replace("mavenCentral()", new_line)
          with open(f, "w") as file:
              file.write(c)
          '

      - name: Install dependencies
        run: flutter pub get

      - name: Build Release APK
        run: flutter build apk --release --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
