name: Build XoDos Fully Functional
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter (Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Deep Fix SDK and Assets
        run: |
          flutter create --platforms=android .
          # Force 26 in the local.properties which Flutter reads first
          echo "flutter.minSdkVersion=26" >> android/local.properties
          # Force it in the build.gradle using a global replace
          find android -name "build.gradle" -exec sed -i 's/minSdkVersion [0-9]*/minSdkVersion 26/g' {} +
          # Fix Manifest just in case
          find android -name "AndroidManifest.xml" -exec sed -i 's/android:minSdkVersion="[0-9]*"/android:minSdkVersion="26"/g' {} +
          mkdir -p assets && touch assets/.gitkeep

      - name: Build Final APK
        run: |
          flutter pub get
          # We pass the version directly into the build command as a final override
          flutter build apk --release --no-tree-shake-icons --min-sdk-version=26

      - name: Upload Finished App
        uses: actions/upload-artifact@v4
        with:
          name: XoDos-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk
